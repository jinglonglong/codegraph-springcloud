<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="Springgraph Web UI preview">
  <title>Springgraph Web UI 预览</title>
  <!-- Background -->
  <rect width="800" height="480" fill="#f7f6f2"/>

  <!-- Window chrome -->
  <rect x="40" y="32" width="720" height="416" fill="#f7f6f2" stroke="#16150f" stroke-width="1.5"/>
  <line x1="40" y1="64" x2="760" y2="64" stroke="#16150f" stroke-width="1.5"/>
  <circle cx="58" cy="48" r="5" fill="#ff5f56" stroke="#16150f" stroke-width="1"/>
  <circle cx="78" cy="48" r="5" fill="#ffbd2e" stroke="#16150f" stroke-width="1"/>
  <circle cx="98" cy="48" r="5" fill="#27c93f" stroke="#16150f" stroke-width="1"/>
  <text x="400" y="52" font-family="ui-monospace, monospace" font-size="11" fill="#56544a" text-anchor="middle">Springgraph — Web UI · localhost:4000</text>

  <!-- Sidebar -->
  <rect x="40" y="64" width="180" height="384" fill="#f1efe8" stroke="none"/>
  <line x1="220" y1="64" x2="220" y2="448" stroke="#16150f" stroke-width="1.5"/>
  <text x="58" y="92" font-family="ui-sans-serif, system-ui" font-size="10" font-weight="700" fill="#56544a" letter-spacing="0.07em">LAYERS</text>
  <rect x="52" y="100" width="156" height="28" fill="#e8e6dd" stroke="none"/>
  <rect x="52" y="100" width="3" height="28" fill="#16150f"/>
  <text x="68" y="118" font-family="ui-sans-serif, system-ui" font-size="12" font-weight="700" fill="#16150f">Entry · Controller</text>
  <text x="58" y="148" font-family="ui-sans-serif, system-ui" font-size="12" fill="#56544a">Remote · Feign</text>
  <text x="58" y="170" font-family="ui-sans-serif, system-ui" font-size="12" fill="#56544a">Business · Service</text>
  <text x="58" y="192" font-family="ui-sans-serif, system-ui" font-size="12" fill="#56544a">Data · Mapper</text>
  <text x="58" y="214" font-family="ui-sans-serif, system-ui" font-size="12" fill="#56544a">Model · DTO/Entity</text>
  <text x="58" y="236" font-family="ui-sans-serif, system-ui" font-size="12" fill="#56544a">Infra · Config</text>

  <text x="58" y="278" font-family="ui-sans-serif, system-ui" font-size="10" font-weight="700" fill="#56544a" letter-spacing="0.07em">STATISTICS</text>
  <text x="58" y="298" font-family="ui-sans-serif, system-ui" font-size="11" fill="#16150f">12 controllers</text>
  <text x="58" y="316" font-family="ui-sans-serif, system-ui" font-size="11" fill="#16150f">23 services</text>
  <text x="58" y="334" font-family="ui-sans-serif, system-ui" font-size="11" fill="#16150f">15 mappers</text>
  <text x="58" y="352" font-family="ui-sans-serif, system-ui" font-size="11" fill="#16150f">8 Feign clients</text>
  <text x="58" y="370" font-family="ui-sans-serif, system-ui" font-size="11" fill="#16150f">47 SQL queries</text>
  <text x="58" y="388" font-family="ui-sans-serif, font-size:11" font-weight:700" fill="#7a201a">156 edges</text>

  <!-- Canvas -->
  <!-- Edges -->
  <g stroke="#16150f" stroke-width="1.2" fill="none">
    <path d="M 360 130 L 280 220" />
    <path d="M 360 130 L 460 220" />
    <path d="M 460 260 L 580 360" />
    <path d="M 580 400 L 700 400" />
    <path d="M 280 260 L 240 360" />
    <path d="M 360 170 L 460 170" stroke-dasharray="3,3"/>
  </g>

  <!-- Nodes -->
  <!-- Entry (Entry) -->
  <g>
    <rect x="290" y="106" width="140" height="48" fill="#f1efe8" stroke="#16150f" stroke-width="1.5"/>
    <rect x="290" y="106" width="140" height="2" fill="#16150f"/>
    <text x="300" y="124" font-family="ui-sans-serif, system-ui" font-size="9" font-weight="700" fill="#7a201a" letter-spacing="0.1em">ENTRY · CONTROLLER</text>
    <text x="300" y="142" font-family="ui-monospace, monospace" font-size="12" font-weight="700" fill="#16150f">UserController</text>
  </g>

  <!-- Remote (Feign) -->
  <g>
    <rect x="210" y="220" width="140" height="40" fill="#f7f6f2" stroke="#16150f" stroke-width="1.5"/>
    <text x="220" y="236" font-family="ui-sans-serif, system-ui" font-size="9" font-weight="700" fill="#56544a" letter-spacing="0.1em">REMOTE · FEIGN</text>
    <text x="220" y="252" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#16150f">OrderClient</text>
  </g>

  <!-- Business (Service) -->
  <g>
    <rect x="390" y="220" width="140" height="40" fill="#f7f6f2" stroke="#16150f" stroke-width="1.5"/>
    <text x="400" y="236" font-family="ui-sans-serif, system-ui" font-size="9" font-weight="700" fill="#56544a" letter-spacing="0.1em">BUSINESS · SERVICE</text>
    <text x="400" y="252" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#16150f">UserService</text>
  </g>

  <!-- Data (Mapper) -->
  <g>
    <rect x="510" y="360" width="140" height="40" fill="#f7f6f2" stroke="#16150f" stroke-width="1.5"/>
    <text x="520" y="376" font-family="ui-sans-serif, system-ui" font-size="9" font-weight="700" fill="#56544a" letter-spacing="0.1em">DATA · MAPPER</text>
    <text x="520" y="392" font-family="ui-monospace, monospace" font-size="11" font-weight="600" fill="#16150f">UserMapper</text>
  </g>

  <!-- SQL/XML -->
  <g>
    <rect x="170" y="360" width="140" height="40" fill="#f7f6f2" stroke="#16150f" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="180" y="376" font-family="ui-sans-serif, system-ui" font-size="9" font-weight="700" fill="#56544a" letter-spacing="0.1em">SQL · XML</text>
    <text x="180" y="392" font-family="ui-monospace, monospace" font-size="10" fill="#16150f">user_mapper.xml</text>
  </g>

  <!-- DB Table -->
  <g>
    <ellipse cx="700" cy="395" rx="46" ry="9" fill="#f1efe8" stroke="#16150f" stroke-width="1.5"/>
    <path d="M 654 395 L 654 415" stroke="#16150f" stroke-width="1.2" fill="none"/>
    <path d="M 746 395 L 746 415" stroke="#16150f" stroke-width="1.2" fill="none"/>
    <ellipse cx="700" cy="415" rx="46" ry="9" fill="#f7f6f2" stroke="#16150f" stroke-width="1.5"/>
    <text x="700" y="430" font-family="ui-monospace, monospace" font-size="10" font-weight="700" fill="#16150f" text-anchor="middle">users</text>
  </g>

  <!-- Endpoint pin -->
  <g>
    <circle cx="360" cy="86" r="6" fill="#7a201a" stroke="#16150f" stroke-width="1.5"/>
    <text x="372" y="80" font-family="ui-monospace, monospace" font-size="10" font-weight="700" fill="#16150f">GET /api/users/&#123;id&#125;</text>
  </g>

  <!-- Trace highlight band -->
  <g>
    <rect x="436" y="0" width="40" height="480" fill="#7a201a" opacity="0.05"/>
  </g>

  <!-- Footer URL bar -->
  <rect x="220" y="416" width="540" height="32" fill="#f1efe8" stroke="none"/>
  <line x1="220" y1="416" x2="760" y2="416" stroke="#16150f" stroke-width="1.5"/>
  <text x="232" y="436" font-family="ui-monospace, monospace" font-size="10" fill="#56544a">GET /api/architecture/trace?url=/api/users/&#123;id&#125;  →  4 hops  ·  156 edges</text>
</svg>
